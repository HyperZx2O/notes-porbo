      html += '<a class="video-card" href="'+v.url+'" target="_blank" rel="noopener">'
        + '<div class="vplay">▶</div>'
        + '<div class="vinfo"><div class="vtitle">'+v.title+'</div><div class="vmeta">'+v.channel+' · '+v.len+'</div></div>'
        + '</a>';
    });
  }

  // flashcards
  html += '<div class="divider-label">Flashcards</div>';
  html += '<div class="section"><div class="fc-wrap" id="fcwrap-'+t.id+'"></div></div>';

  // mcq
  html += '<div class="divider-label">Quick Quiz</div>';
  html += '<div id="mcqwrap-'+t.id+'"></div>';

  // review checkbox
  html += '<div class="review-row" data-reviewtopic="'+t.id+'"><div class="review-box"></div><div><div class="rtext">Mark "'+t.title+'" as reviewed</div><div class="rsub">Check this once you feel confident on this topic</div></div></div>';

  html += '</div>';
  document.getElementById('main').insertAdjacentHTML('beforeend', html);

  buildFlashcards('fcwrap-'+t.id, t.flashcards, t.id);
  buildMCQs('mcqwrap-'+t.id, t.mcqs, t.id);

  document.querySelector('#page-'+t.id+' .review-row').addEventListener('click', ()=> toggleChecklist(t.id));
}

/* ---------- FINAL REVIEW PAGE ---------- */
function renderFinalPage(){
  let html = '<div class="page" id="page-final">';
  html += '<div class="page-head">';
  html += '<div class="crumb">'+elemBadge('08','FR','c-violet')+'<span>FULL SYLLABUS REVIEW</span></div>';
  html += '<h2>Final Review</h2>';
  html += '<div class="desc">Mixed flashcards and MCQs pulled from every topic. Use this as your last pass before the exam to check what actually stuck.</div>';
  html += '<div class="meta-row"><div class="meta-chip">⏱ Suggested time: <b>60 min</b></div>'
    + '<div class="meta-chip">🃏 <b>'+FINAL_FLASHCARDS.length+'</b> flashcards</div>'
    + '<div class="meta-chip">✅ <b>'+FINAL_MCQS.length+'</b> quiz questions</div></div>';
  html += '</div>';

  html += '<div class="divider-label">Flashcards — all topics mixed</div>';
  html += '<div class="section"><div class="fc-wrap" id="fcwrap-final"></div></div>';

  html += '<div class="divider-label">Full Practice Quiz</div>';
  html += '<div id="mcqwrap-final"></div>';

  html += '<div class="review-row" data-reviewtopic="final"><div class="review-box"></div><div><div class="rtext">Mark Final Review as completed</div><div class="rsub">You\'ve gone through the whole syllabus once more — nice work</div></div></div>';

  html += '</div>';
  document.getElementById('main').insertAdjacentHTML('beforeend', html);

  buildFlashcards('fcwrap-final', FINAL_FLASHCARDS, 'final');
  buildMCQs('mcqwrap-final', FINAL_MCQS, 'final');
  document.querySelector('#page-final .review-row').addEventListener('click', ()=> toggleChecklist('final'));
}

/* ---------- FLASHCARD ENGINE ---------- */
function buildFlashcards(containerId, cards, setId){
  const container = document.getElementById(containerId);
  let idx = 0;
  let flipped = false;

  container.innerHTML =
    '<div class="fc-stage"><div class="fc-card" id="'+containerId+'-card">'
    + '<div class="fc-face fc-front"><div></div><div class="fc-hint">Tap to flip</div></div>'
    + '<div class="fc-face fc-back"><div></div><div class="fc-hint">Tap to flip back</div></div>'
    + '</div></div>'
    + '<div class="fc-controls">'
    + '<button class="fc-btn" id="'+containerId+'-prev">&larr; Prev</button>'
    + '<span class="fc-counter" id="'+containerId+'-counter"></span>'
    + '<button class="fc-btn" id="'+containerId+'-next">Next &rarr;</button>'
    + '</div>';

  const cardEl = document.getElementById(containerId+'-card');
  const frontText = container.querySelector('.fc-front > div:first-child');
  const backText = container.querySelector('.fc-back > div:first-child');
  const counter = document.getElementById(containerId+'-counter');

  function render(){
    frontText.textContent = cards[idx].q;
    backText.textContent = cards[idx].a;
    cardEl.classList.remove('flipped');
    flipped = false;
    counter.textContent = (idx+1)+' / '+cards.length;
  }
  cardEl.addEventListener('click', ()=>{
    flipped = !flipped;
    cardEl.classList.toggle('flipped', flipped);
  });
  document.getElementById(containerId+'-prev').addEventListener('click', ()=>{
    idx = (idx-1+cards.length)%cards.length; render();
  });
  document.getElementById(containerId+'-next').addEventListener('click', ()=>{
    idx = (idx+1)%cards.length; render();
  });
  render();
}

/* ---------- MCQ ENGINE ---------- */
function buildMCQs(containerId, mcqs, setId){
  const container = document.getElementById(containerId);
  if(!STATE.mcq[setId]) STATE.mcq[setId] = {};

  function scoreText(){
    const answers = STATE.mcq[setId] || {};
    let correctCount = 0;
    let answeredCount = 0;
    mcqs.forEach((m,i)=>{
      if(answers[i] !== undefined){
        answeredCount++;
        if(answers[i] === m.correct) correctCount++;
      }
    });
    return {correctCount, answeredCount, total:mcqs.length};
  }

  function renderScoreBar(){
    const s = scoreText();
    return '<div class="mcq-score-bar"><div class="label">Score: <span class="score">'+s.correctCount+' / '+s.total+'</span> &nbsp;('+s.answeredCount+' answered)</div><button class="mcq-reset" id="'+containerId+'-reset">Reset quiz</button></div>';
  }

  function renderQuestions(){
    const answers = STATE.mcq[setId] || {};
    return mcqs.map((m,i)=>{
      const chosen = answers[i];
      const answeredThis = chosen !== undefined;
      const optsHtml = m.opts.map((o,oi)=>{
        let cls = 'mcq-opt';
        if(answeredThis){
          cls += ' disabled';
          if(oi===m.correct) cls += ' correct';
          else if(oi===chosen) cls += ' incorrect';
        }
        const key = String.fromCharCode(65+oi);
        return '<div class="'+cls+'" data-qi="'+i+'" data-oi="'+oi+'"><span class="optkey">'+key+'</span><span>'+o+'</span></div>';
      }).join('');
      const whyHtml = '<div class="mcq-why'+(answeredThis?' show':'')+'" id="'+containerId+'-why-'+i+'"><b>Why:</b> '+m.why+'</div>';
      const footHtml = answeredThis
        ? '<div class="mcq-foot"><span class="mcq-result-tag '+(chosen===m.correct?'right':'wrong')+'">'+(chosen===m.correct?'✓ Correct':'✗ Not quite')+'</span>'
          + '<button class="mcq-retry" data-retry-qi="'+i+'">↻ Try again</button></div>'
        : '';
      return '<div class="mcq-item"><div class="mcq-q"><span class="mcq-qnum">Q'+(i+1)+'.</span>'+m.q+'</div>'+optsHtml+whyHtml+footHtml+'</div>';
    }).join('');
  }

  function fullRender(){
    container.innerHTML = renderScoreBar() + renderQuestions();
    container.querySelectorAll('.mcq-opt').forEach(el=>{
      el.addEventListener('click', onSelect);
    });
    container.querySelectorAll('.mcq-retry').forEach(el=>{
      el.addEventListener('click', onRetryQuestion);
    });
    document.getElementById(containerId+'-reset').addEventListener('click', ()=>{
      STATE.mcq[setId] = {};
      saveMcq();
      fullRender();
      updateProgress();
      syncChecklistUI();
    });
  }

  function onRetryQuestion(e){
    const qi = parseInt(e.currentTarget.getAttribute('data-retry-qi'));
    delete STATE.mcq[setId][qi];
    saveMcq();
    fullRender();
    updateProgress();
    syncChecklistUI();
  }

  function onSelect(e){
    const el = e.currentTarget;
    if(el.classList.contains('disabled')) return;
    const qi = parseInt(el.getAttribute('data-qi'));
    const oi = parseInt(el.getAttribute('data-oi'));
    STATE.mcq[setId][qi] = oi;
    saveMcq();
    fullRender();
    updateProgress();
    syncChecklistUI();
  }

  fullRender();
}

/* ---------- PROGRESS BAR ---------- */
function updateProgress(){
  let checklistTotal = TOPICS.length + 1; // +1 for final
  let checklistDone = 0;
  TOPICS.forEach(t=>{ if(STATE.checklist[t.id]) checklistDone++; });
  if(STATE.checklist['final']) checklistDone++;

  let mcqTotal = 0, mcqDone = 0;
  TOPICS.forEach(t=>{
    mcqTotal += t.mcqs.length;
    const ans = STATE.mcq[t.id] || {};
    mcqDone += Object.keys(ans).length;
  });
  mcqTotal += FINAL_MCQS.length;
  const finalAns = STATE.mcq['final'] || {};
  mcqDone += Object.keys(finalAns).length;

  const totalItems = checklistTotal + mcqTotal;
  const doneItems = checklistDone + mcqDone;
  const pct = totalItems ? Math.round((doneItems/totalItems)*100) : 0;

  const wrap = document.getElementById('progressWrap');
  const fill = document.getElementById('progressFill');
  const label = document.getElementById('progressLabel');

  if(doneItems > 0){
    document.body.classList.add('progress-active');
    wrap.classList.add('show');
  }
  fill.style.width = pct+'%';
  label.textContent = pct+'% reviewed';
}

/* ---------- BOOT ---------- */
async function boot(){
  await loadAllState();
  buildSidebar();

  renderHome();
  TOPICS.forEach(renderTopicPage);
  renderFinalPage();

  syncChecklistUI();
  updateProgress();
  navigate('home');

  // mobile menu
  document.getElementById('menuToggle').addEventListener('click', ()=>{
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('scrim').classList.toggle('show');
  });
  document.getElementById('scrim').addEventListener('click', closeSidebarMobile);

  // reset all
  document.getElementById('resetBtn').addEventListener('click', async ()=>{
    if(!confirm('Reset all checklist progress and quiz answers? This cannot be undone.')) return;
    STATE = {checklist:{}, mcq:{}};
    await storeSet('checklist', {});
    await storeSet('mcqAnswers', {});
    document.getElementById('main').innerHTML = '';
    renderHome();
    TOPICS.forEach(renderTopicPage);
    renderFinalPage();
    syncChecklistUI();
    updateProgress();
    navigate('home');
    document.body.classList.remove('progress-active');
    document.getElementById('progressWrap').classList.remove('show');
  });
}

boot();
</script>

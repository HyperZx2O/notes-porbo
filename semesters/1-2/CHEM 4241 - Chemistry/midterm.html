/* ---------- FLASHCARD ENGINE ---------- */
function buildFlashcards(containerId, cards, setId){
  const container = document.getElementById(containerId);
  let idx = 0;
  let flipped = false;

  container.innerHTML =
    '<div class="fc-stage"><div class="fc-card" id="'+containerId+'-card">'
    + '<div class="fc-face fc-front"><div></div><div class="fc-hint">Tap to flip</div></div>'
    + '<div class="fc-face fc-back"><div></div><div class="fc-hint">Tap to flip back</div></div>'
    + '</div></div>'
    + '<div class="fc-controls">'
    + '<button class="fc-btn" id="'+containerId+'-prev">&larr; Prev</button>'
    + '<span class="fc-counter" id="'+containerId+'-counter"></span>'
    + '<button class="fc-btn" id="'+containerId+'-next">Next &rarr;</button>'
    + '<button class="fc-btn" id="'+containerId+'-shuffle" title="Shuffle cards">&#128256;</button>'
    + '</div>';

  const cardEl = document.getElementById(containerId+'-card');
  const frontText = container.querySelector('.fc-front > div:first-child');
  const backText = container.querySelector('.fc-back > div:first-child');
  const counter = document.getElementById(containerId+'-counter');

  // ponytail: O(n) Fisher-Yates shuffle, order array preserves original data
  let order = cards.map((_,i)=>i);
  if(setId === 'final') shuffleArray(order); // auto-shuffle final review

  function shuffleArray(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

  function render(){
    frontText.textContent = cards[order[idx]].q;
    backText.textContent = cards[order[idx]].a;
    cardEl.classList.remove('flipped');
    flipped = false;
    counter.textContent = (idx+1)+' / '+cards.length;
  }
  cardEl.addEventListener('click', ()=>{
    flipped = !flipped;
    cardEl.classList.toggle('flipped', flipped);
  });
  document.getElementById(containerId+'-prev').addEventListener('click', ()=>{
    idx = (idx-1+cards.length)%cards.length; render();
  });
  document.getElementById(containerId+'-next').addEventListener('click', ()=>{
    idx = (idx+1)%cards.length; render();
  });
  document.getElementById(containerId+'-shuffle').addEventListener('click', ()=>{
    shuffleArray(order); idx=0; render();
  });
  // ponytail: keyboard nav via container, only when this flashcard set is on the active page
  container.addEventListener('keydown', function handler(e){
    if(!document.getElementById('page-'+setId)?.classList.contains('active') && setId !== 'final' && setId !== 'home') return;
    if(!document.getElementById(containerId+'-card')){container.removeEventListener('keydown',handler);return;}
    if(e.key==='ArrowLeft'){idx=(idx-1+cards.length)%cards.length;render();e.preventDefault();}
    if(e.key==='ArrowRight'){idx=(idx+1)%cards.length;render();e.preventDefault();}
    if(e.key===' '){flipped=!flipped;cardEl.classList.toggle('flipped',flipped);e.preventDefault();}
  });
  container.setAttribute('tabindex','0');
  render();
}

/* ---------- MCQ ENGINE ---------- */
function buildMCQs(containerId, mcqs, setId){
  const container = document.getElementById(containerId);
  if(!STATE.mcq[setId]) STATE.mcq[setId] = {};

  function scoreText(){
    const answers = STATE.mcq[setId] || {};
    let correctCount = 0;
    let answeredCount = 0;
    mcqs.forEach((m,i)=>{
      if(answers[i] !== undefined){
        answeredCount++;
        if(answers[i] === m.correct) correctCount++;
      }
    });
    return {correctCount, answeredCount, total:mcqs.length};
  }

  function renderScoreBar(){
    const s = scoreText();
    return '<div class="mcq-score-bar"><div class="label">Score: <span class="score">'+s.correctCount+' / '+s.total+'</span> &nbsp;('+s.answeredCount+' answered)</div><button class="mcq-reset" id="'+containerId+'-reset">Reset quiz</button></div>';
  }

  function renderQuestions(){
    const answers = STATE.mcq[setId] || {};
    return mcqs.map((m,i)=>{
      const chosen = answers[i];
      const answeredThis = chosen !== undefined;
      const optsHtml = m.opts.map((o,oi)=>{
        let cls = 'mcq-opt';
        if(answeredThis){
          cls += ' disabled';
          if(oi===m.correct) cls += ' correct';
          else if(oi===chosen) cls += ' incorrect';
        }
        const key = String.fromCharCode(65+oi);
        return '<div class="'+cls+'" data-qi="'+i+'" data-oi="'+oi+'"><span class="optkey">'+key+'</span><span>'+o+'</span></div>';
      }).join('');
      const whyHtml = '<div class="mcq-why'+(answeredThis?' show':'')+'" id="'+containerId+'-why-'+i+'"><b>Why:</b> '+m.why+'</div>';
      const footHtml = answeredThis
        ? '<div class="mcq-foot"><span class="mcq-result-tag '+(chosen===m.correct?'right':'wrong')+'">'+(chosen===m.correct?'✓ Correct':'✗ Not quite')+'</span>'
          + '<button class="mcq-retry" data-retry-qi="'+i+'">↻ Try again</button></div>'
        : '';
      return '<div class="mcq-item"><div class="mcq-q"><span class="mcq-qnum">Q'+(i+1)+'.</span>'+m.q+'</div>'+optsHtml+whyHtml+footHtml+'</div>';
    }).join('');
  }

  function fullRender(){
    const sy = window.scrollY; // ponytail: preserve scroll pos across full re-render
    container.innerHTML = renderScoreBar() + renderQuestions();
    container.querySelectorAll('.mcq-opt').forEach(el=>{
      el.addEventListener('click', onSelect);
    });
    container.querySelectorAll('.mcq-retry').forEach(el=>{
      el.addEventListener('click', onRetryQuestion);
    });
    document.getElementById(containerId+'-reset').addEventListener('click', ()=>{
      STATE.mcq[setId] = {};
      saveMcq();
      fullRender();
      updateProgress();
      syncChecklistUI();
    });
    window.scrollTo({top:sy, behavior:'auto'}); // restore scroll
  }

  function onRetryQuestion(e){
    const qi = parseInt(e.currentTarget.getAttribute('data-retry-qi'));
    delete STATE.mcq[setId][qi];
    saveMcq();
    fullRender();
    updateProgress();
    syncChecklistUI();
  }

  function onSelect(e){
    const el = e.currentTarget;
    if(el.classList.contains('disabled')) return;
    const qi = parseInt(el.getAttribute('data-qi'));
    const oi = parseInt(el.getAttribute('data-oi'));
    STATE.mcq[setId][qi] = oi;
    saveMcq();
    fullRender();
    updateProgress();
    syncChecklistUI();
  }

  fullRender();
}

/* ---------- PROGRESS BAR ---------- */
function updateProgress(){
  let checklistTotal = TOPICS.length + 1;
  let checklistDone = 0;
  TOPICS.forEach(t=>{ if(STATE.checklist[t.id]) checklistDone++; });
  if(STATE.checklist['final']) checklistDone++;

  let mcqTotal = 0, mcqDone = 0;
  TOPICS.forEach(t=>{
    mcqTotal += t.mcqs.length;
    const ans = STATE.mcq[t.id] || {};
    mcqDone += Object.keys(ans).length;
  });
  mcqTotal += FINAL_MCQS.length;
  const finalAns = STATE.mcq['final'] || {};
  mcqDone += Object.keys(finalAns).length;

  const totalItems = checklistTotal + mcqTotal;
  const doneItems = checklistDone + mcqDone;
  const pct = totalItems ? Math.round((doneItems/totalItems)*100) : 0;

  const wrap = document.getElementById('progressWrap');
  const fill = document.getElementById('progressFill');
  const label = document.getElementById('progressLabel');
  const detail = document.getElementById('progressDetail');

  if(doneItems > 0){
    document.body.classList.add('progress-active');
    wrap.classList.add('show');
  }
  fill.style.width = pct+'%';
  fill.classList.toggle('complete', pct===100);
  label.textContent = pct+'% reviewed';
  detail.textContent = 'checklist '+checklistDone+'/'+checklistTotal+' · mcq '+mcqDone+'/'+mcqTotal;
  if(pct===100 && !document.getElementById('doneMsg')){
    const msg = document.createElement('div');
    msg.id='doneMsg';
    msg.style.cssText='position:fixed;bottom:20px;right:20px;background:var(--good-dim);border:1px solid var(--good);border-radius:12px;padding:16px 20px;z-index:50;font-size:14px;color:var(--good);max-width:320px;animation:fadeIn .5s ease;box-shadow:0 4px 20px rgba(0,0,0,.4);';
    msg.innerHTML='&#10003; Everything completed! You\'re ready for the exam.';
    document.body.appendChild(msg);
    setTimeout(()=>{msg.style.transition='opacity .5s';msg.style.opacity='0';setTimeout(()=>msg.remove(),500);},8000);
  }
}

/* ============================================================
   Q&A PAGE RENDERING
   ============================================================ */
function renderQNA(){
  let html = '<div class="page" id="page-qna">';

  // page head
  html += '<div class="page-head">';
  html += '<div class="crumb">'+elemBadge('QA','Q&A','c-violet')+'<span>QUESTION BANK</span></div>';
  html += '<h2>Comprehensive Q&A</h2>';
  html += '<div class="desc">Fully solved questions from all 5 chapters &mdash; search, filter by chapter, or expand each question to see the full answer.</div>';
  html += '</div>';

  // search bar
  html += '<div class="qna-search-wrap">';
  html += '<span class="qna-search-icon">&#128269;</span>';
  html += '<input class="qna-search" id="qnaSearch" type="text" placeholder="Search questions..." autocomplete="off">';
  html += '</div>';

  // chapter tabs
  html += '<div class="qna-tabs" id="qnaTabs">';
  html += '<div class="qna-tab active" data-chapter="all">All Chapters</div>';
  QNA_CHAPTERS.forEach(ch=>{
    html += '<div class="qna-tab" data-chapter="'+ch.id+'">Ch. '+ch.num+' &middot; '+ch.title.replace('Chapter '+ch.num+': ','')+'</div>';
  });
  html += '</div>';

  // meta bar
  const totalQ = QNA_CHAPTERS.reduce((s,ch)=>s+ch.questions.length,0);
  html += '<div class="qna-meta">';
  html += '<span><b>'+totalQ+'</b> questions across <b>'+QNA_CHAPTERS.length+'</b> chapters</span>';
  html += '<span id="qnaVisibleCount"></span>';
  html += '</div>';

  // accordion container
  html += '<div id="qnaAccordion"></div>';

  html += '</div>';
  document.getElementById('main').insertAdjacentHTML('beforeend', html);

  function renderQuestions(filterChapter, filterText){
    const container = document.getElementById('qnaAccordion');
    let visibleCount = 0;
    let cards = '';
    QNA_CHAPTERS.forEach(ch=>{
      if(filterChapter && filterChapter !== 'all' && filterChapter !== ch.id) return;

      ch.questions.forEach((qa, qi)=>{
        const searchTarget = (qa.q + ' ' + qa.a).toLowerCase();
        if(filterText && !searchTarget.includes(filterText.toLowerCase())) return;
        visibleCount++;

        const cid = 'qna-' + ch.id + '-' + qi;
        cards += '<div class="qna-card" id="'+cid+'">'
          + '<div class="qna-card-head" onclick="toggleQNA(\''+cid+'\')">'
          + '<span class="qna-num">' + ch.num + '.' + (qi+1) + '</span>'
          + '<span style="flex:1">' + qa.q + '</span>'
          + '<span class="qna-chevron">&#9654;</span>'
          + '</div>'
          + '<div class="qna-card-body"><div class="qna-card-inner">'
          + qa.a
          + '</div></div>'
          + '</div>';
      });
    });
    container.innerHTML = cards || '<div class="qna-empty"><p>No questions match your search.</p><p style="font-size:13px;">Try a different keyword or browse all chapters.</p></div>';
    document.getElementById('qnaVisibleCount').textContent = visibleCount + ' shown';
  }

  // initial render
  renderQuestions('all', '');

  // search
  let searchTimer;
  document.getElementById('qnaSearch').addEventListener('input', function(){
    clearTimeout(searchTimer);
    searchTimer = setTimeout(()=>{
      const activeTab = document.querySelector('.qna-tab.active');
      const ch = activeTab ? activeTab.getAttribute('data-chapter') : 'all';
      renderQuestions(ch, this.value);
    }, 200);
  });

  // tab switching
  document.querySelectorAll('#qnaTabs .qna-tab').forEach(tab=>{
    tab.addEventListener('click', function(){
      document.querySelectorAll('#qnaTabs .qna-tab').forEach(t=>t.classList.remove('active'));
      this.classList.add('active');
      const ch = this.getAttribute('data-chapter');
      const searchVal = document.getElementById('qnaSearch').value;
      renderQuestions(ch, searchVal);
    });
  });
}

/* ---------- Q&A accordion toggle ---------- */
function toggleQNA(cardId){
  const card = document.getElementById(cardId);
  if(!card) return;
  const isOpen = card.classList.contains('open');
  card.classList.toggle('open');
  // close others if opening
  if(!isOpen){
    document.querySelectorAll('.qna-card.open').forEach(other=>{
      if(other.id !== cardId) other.classList.remove('open');
    });
  }
}

/* ---------- BOOT ---------- */
async function boot(){
  await loadAllState();
  buildSidebar();

  renderHome();
  TOPICS.forEach(renderTopicPage);
  renderQNA();
  renderFinalPage();

  syncChecklistUI();
  updateProgress();
  navigate('home');

  // mobile menu
  document.getElementById('menuToggle').addEventListener('click', ()=>{
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('scrim').classList.toggle('show');
  });
  document.getElementById('scrim').addEventListener('click', closeSidebarMobile);

  // reset all
  document.getElementById('resetBtn').addEventListener('click', async ()=>{
    if(!confirm('Reset all checklist progress and quiz answers? This cannot be undone.')) return;
    STATE = {checklist:{}, mcq:{}};
    await storeSet('checklist', {});
    await storeSet('mcqAnswers', {});
    document.getElementById('main').innerHTML = '';
    renderHome();
    TOPICS.forEach(renderTopicPage);
    renderQNA();
    renderFinalPage();
    syncChecklistUI();
    updateProgress();
    navigate('home');
    document.body.classList.remove('progress-active');
    document.getElementById('progressWrap').classList.remove('show');
  });
}

boot();

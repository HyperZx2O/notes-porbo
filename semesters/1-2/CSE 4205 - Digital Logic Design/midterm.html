<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DLD Midterm — 1-Day Survival Guide</title>
<style>
:root{
  --bg:#0a0e14;
  --bg-panel:#10151d;
  --bg-card:#141a23;
  --bg-raised:#1a212c;
  --border:#222b38;
  --border-soft:#1b2330;
  --text:#dbe4ee;
  --text-dim:#8893a3;
  --text-faint:#5a6577;
  --cyan:#3dd6c5;
  --cyan-dim:#2a8f84;
  --amber:#ffb454;
  --amber-dim:#a87530;
  --red:#ff6b6b;
  --green:#5fd97a;
  --violet:#a78bfa;
  --mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --sidebar-w: 290px;
}

*{box-sizing:border-box; margin:0; padding:0;}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
}

html, body{ height:100%; }
body{
  background:
    radial-gradient(ellipse 900px 500px at 15% -5%, rgba(61,214,197,0.08), transparent),
    radial-gradient(ellipse 700px 500px at 100% 10%, rgba(255,180,84,0.05), transparent),
    var(--bg);
  color:var(--text);
  font-family:var(--sans);
  line-height:1.55;
  min-height:100vh;
}

::selection{ background:rgba(61,214,197,0.3); color:#fff; }
::-webkit-scrollbar{ width:10px; height:10px; }
::-webkit-scrollbar-track{ background:var(--bg); }
::-webkit-scrollbar-thumb{ background:#26313f; border-radius:5px; }
::-webkit-scrollbar-thumb:hover{ background:var(--cyan-dim); }

a{ color:var(--cyan); }
:focus-visible{ outline:2px solid var(--cyan); outline-offset:2px; border-radius:4px; }

/* ================= APP SHELL ================= */
.app{ display:flex; min-height:100vh; }

/* ---------- SIDEBAR ---------- */
.sidebar{
  width:var(--sidebar-w); min-width:var(--sidebar-w);
  background:var(--bg-panel);
  border-right:1px solid var(--border);
  height:100vh; position:sticky; top:0;
  display:flex; flex-direction:column;
  overflow-y:auto;
  z-index:50;
}
.sidebar-brand{
  padding:18px 18px 14px;
  font-family:var(--mono); font-size:12.5px; color:var(--cyan); letter-spacing:0.5px;
  display:flex; align-items:center; gap:8px;
  border-bottom:1px solid var(--border-soft);
}
.sidebar-brand .dot{ width:7px;height:7px;border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s infinite; }
@keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:0.4} }

.sidebar-progress{ padding:14px 18px; border-bottom:1px solid var(--border-soft); }
.sidebar-progress .lbl{ font-family:var(--mono); font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:1px; display:flex; justify-content:space-between; margin-bottom:7px; }
.sidebar-progress .track{ height:6px; background:#1b2330; border-radius:4px; overflow:hidden; border:1px solid var(--border-soft); }
.sidebar-progress .fill{ height:100%; border-radius:4px; background:linear-gradient(90deg, var(--cyan-dim), var(--cyan)); width:0%; transition:width 0.4s ease; box-shadow:0 0 10px rgba(61,214,197,0.5); }

.sidebar-nav{ flex:1; padding:10px 10px 20px; }
.sidebar-group-label{
  font-family:var(--mono); font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:1.5px;
  padding:14px 10px 6px;
}
.sidebar-link{
  display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; cursor:pointer;
  text-decoration:none; color:var(--text-dim); transition:all .15s; font-size:13.5px; position:relative;
}
.sidebar-link:hover{ background:var(--bg-raised); color:var(--text); }
.sidebar-link.active{ background:rgba(61,214,197,0.1); color:var(--cyan); }
.sidebar-link.active::before{
  content:''; position:absolute; left:-10px; top:0; bottom:0; width:3px; background:var(--cyan); border-radius:0 3px 3px 0;
}
.sidebar-link .snum{
  font-family:var(--mono); font-size:10.5px; width:22px; height:22px; min-width:22px; border-radius:6px;
  background:var(--bg-card); display:flex; align-items:center; justify-content:center; color:var(--text-faint);
}
.sidebar-link.active .snum{ background:var(--cyan); color:var(--bg); font-weight:700; }
.sidebar-link .sring{ margin-left:auto; width:16px; height:16px; position:relative; flex-shrink:0; }
.sidebar-link .sring svg{ transform:rotate(-90deg); }
.sidebar-link .sring .bgr{ fill:none; stroke:#222b38; stroke-width:2.5; }
.sidebar-link .sring .fgr{ fill:none; stroke:var(--cyan); stroke-width:2.5; stroke-linecap:round; transition:stroke-dashoffset .3s; }
.sidebar-link .stext{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

.sidebar-foot{ padding:14px 18px; border-top:1px solid var(--border-soft); }
.sidebar-foot button{
  width:100%; font-family:var(--mono); font-size:11px; padding:8px; border-radius:7px; border:1px solid var(--border);
  background:var(--bg-card); color:var(--text-faint); cursor:pointer; transition:all .15s;
}
.sidebar-foot button:hover{ border-color:var(--red); color:var(--red); }

.sidebar-toggle{
  display:none; position:fixed; top:14px; left:14px; z-index:200;
  width:40px; height:40px; border-radius:10px; background:var(--bg-panel); border:1px solid var(--border);
  color:var(--cyan); align-items:center; justify-content:center; cursor:pointer;
}
.sidebar-backdrop{ display:none; }

/* ---------- MAIN CONTENT ---------- */
.main{ flex:1; min-width:0; display:flex; flex-direction:column; min-height:100vh; }
.main-scroll{ flex:1; }
.page{ max-width:880px; margin:0 auto; padding:44px 32px 40px; min-height:60vh; }
.page.is-hidden{ display:none; }

.pager{
  position:sticky; bottom:0; z-index:40;
  background:rgba(10,14,20,0.92); backdrop-filter:blur(10px);
  border-top:1px solid var(--border);
  padding:14px 32px;
  display:flex; align-items:center; justify-content:space-between; gap:14px;
}
.pager-btn{
  display:flex; align-items:center; gap:10px; padding:10px 16px; border-radius:10px; border:1px solid var(--border);
  background:var(--bg-card); color:var(--text); cursor:pointer; transition:all .15s; text-decoration:none;
  font-size:13.5px; max-width:42%;
}
.pager-btn:hover{ border-color:var(--cyan-dim); background:var(--bg-raised); }
.pager-btn.disabled{ opacity:0.3; pointer-events:none; }
.pager-btn .pdir{ font-family:var(--mono); font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:1px; }
.pager-btn .ptitle{ font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pager-btn.next{ flex-direction:row-reverse; text-align:right; margin-left:auto; }
.pager-center{ font-family:var(--mono); font-size:11.5px; color:var(--text-faint); white-space:nowrap; }

/* ================= HERO (home page) ================= */
.hero-eyebrow{
  font-family:var(--mono); font-size:12px; color:var(--amber); letter-spacing:2px; text-transform:uppercase;
  display:flex; align-items:center; gap:10px; margin-bottom:18px;
}
.hero-eyebrow::before{ content:''; width:24px; height:1px; background:var(--amber); }
.hero h1{
  font-size:clamp(30px,4.4vw,46px); font-weight:800; letter-spacing:-0.02em; line-height:1.08;
  color:#f3f6fa;
}
.hero h1 .hl{ color:var(--cyan); }
.hero-sub{ color:var(--text-dim); font-size:16px; max-width:640px; margin-top:14px; }
.hero-meta{ display:flex; flex-wrap:wrap; gap:10px; margin-top:24px; }
.meta-chip{
  font-family:var(--mono); font-size:12px; padding:7px 12px; border-radius:7px;
  background:var(--bg-card); border:1px solid var(--border); color:var(--text-dim);
  display:flex; align-items:center; gap:6px;
}
.meta-chip b{ color:var(--text); }
.meta-chip.warn{ border-color:rgba(255,180,84,0.35); color:var(--amber); }

.toc{ display:grid; grid-template-columns:repeat(auto-fill, minmax(250px,1fr)); gap:10px; margin-top:18px; }
.toc-item{
  text-decoration:none; display:flex; align-items:center; gap:10px; padding:12px 14px; cursor:pointer;
  background:var(--bg-card); border:1px solid var(--border); border-radius:9px; transition:all .15s;
}
.toc-item:hover{ border-color:var(--cyan-dim); transform:translateX(2px); }
.toc-item .tn{ font-family:var(--mono); font-size:11px; color:var(--bg); background:var(--cyan); padding:3px 7px; border-radius:5px; font-weight:700; }
.toc-item .tt{ font-size:13px; color:var(--text); }
.toc-item .tc{ margin-left:auto; font-family:var(--mono); font-size:10.5px; color:var(--text-faint); }

.btn{
  font-family:var(--mono); font-size:12.5px; padding:9px 16px; border-radius:8px; border:1px solid var(--border);
  background:var(--bg-card); color:var(--text-dim); cursor:pointer; transition:all .15s; text-decoration:none; display:inline-flex; align-items:center;
}
.btn:hover{ border-color:var(--cyan-dim); color:var(--cyan); }
.btn.primary{ background:var(--cyan); color:#04211d; border-color:var(--cyan); font-weight:700; }
.btn.primary:hover{ background:#4fe3d1; color:#04211d; }
.btn-row{ display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }

.section-label{
  font-family:var(--mono); font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:2px;
  margin-bottom:6px;
}
.section-heading{ font-size:26px; font-weight:800; color:#f3f6fa; margin-bottom:6px; }
.section-desc{ color:var(--text-dim); font-size:14.5px; max-width:680px; margin-bottom:22px; }

.panel{ background:var(--bg-panel); border:1px solid var(--border); border-radius:14px; padding:28px; }
.panel + .panel{ margin-top:18px; }

/* ================= CHAPTER PAGE HEADER ================= */
.ch-page-head{ margin-bottom:30px; }
.ch-page-eyebrow{
  font-family:var(--mono); font-size:11.5px; color:var(--cyan); text-transform:uppercase; letter-spacing:2px;
  display:flex; align-items:center; gap:10px; margin-bottom:14px;
}
.ch-page-eyebrow .chnum{ font-family:var(--mono); font-size:12px; color:var(--bg); background:var(--cyan); padding:3px 9px; border-radius:5px; font-weight:700; }
.ch-page-title{ font-size:clamp(24px,3.4vw,34px); font-weight:800; color:#f3f6fa; line-height:1.15; }
.ch-page-sub{ font-size:14.5px; color:var(--text-dim); margin-top:8px; }
.ch-page-meta{ display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }

/* ============ CHECKLIST ============ */
.checklist{ display:flex; flex-direction:column; gap:2px; }
.checklist-title{
  font-family:var(--mono); font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:1.5px;
  margin-bottom:10px; display:flex; align-items:center; gap:8px;
}
.checklist-title::after{ content:''; flex:1; height:1px; background:var(--border-soft); }
.check-item{
  display:flex; align-items:center; gap:11px; padding:9px 10px; border-radius:8px; cursor:pointer;
  transition:background .15s;
}
.check-item:hover{ background:var(--bg-raised); }
.check-item input{ display:none; }
.check-box{
  width:19px; height:19px; min-width:19px; border-radius:5px; border:1.5px solid #3a4456;
  display:flex; align-items:center; justify-content:center; transition:all .15s; background:var(--bg-card);
}
.check-item input:checked + .check-box{ background:var(--cyan); border-color:var(--cyan); }
.check-box svg{ width:12px; height:12px; opacity:0; transition:opacity .1s; }
.check-item input:checked + .check-box svg{ opacity:1; }
.check-label{ font-size:14.5px; color:var(--text); }
.check-item input:checked ~ .check-label{ color:var(--text-faint); text-decoration:line-through; }

/* ============ CONTENT BLOCKS ============ */
.content{ margin-top:28px; }
.content h4{
  font-size:14px; color:var(--cyan); font-family:var(--mono); letter-spacing:0.5px;
  margin:18px 0 8px; text-transform:uppercase;
}
.content h4:first-child{ margin-top:0; }
.content p{ color:var(--text); font-size:14.5px; margin-bottom:8px; }
.content ul{ padding-left:20px; margin-bottom:10px; }
.content li{ font-size:14.5px; color:var(--text); margin-bottom:5px; }
.content .dim{ color:var(--text-dim); }
.formula{
  font-family:var(--mono); background:var(--bg-card); border:1px solid var(--border);
  border-left:3px solid var(--cyan); padding:10px 14px; border-radius:6px; margin:10px 0;
  font-size:14px; color:var(--amber); overflow-x:auto; white-space:nowrap;
}
.tbl{ width:100%; border-collapse:collapse; margin:10px 0; font-size:13.5px; }
.tbl th{
  background:var(--bg-raised); color:var(--cyan); text-align:left; padding:8px 10px;
  font-family:var(--mono); font-size:11.5px; text-transform:uppercase; letter-spacing:0.5px;
  border-bottom:1px solid var(--border);
}
.tbl td{ padding:7px 10px; border-bottom:1px solid var(--border-soft); color:var(--text); font-family:var(--mono); }
.tbl tr:hover td{ background:rgba(61,214,197,0.04); }
.note{
  background:rgba(255,180,84,0.06); border:1px solid rgba(255,180,84,0.25); border-radius:8px;
  padding:10px 14px; font-size:13.5px; color:var(--amber); margin:10px 0;
}
.note b{ color:#ffc97a; }
.example{ background:var(--bg-card); border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin:10px 0; }
.example .ex-label{ font-family:var(--mono); font-size:10.5px; color:var(--violet); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }

/* ============ VIDEO LINK ============ */
.video-block{
  display:flex; align-items:center; gap:14px; background:var(--bg-card); border:1px solid var(--border);
  border-radius:10px; padding:14px 16px; text-decoration:none; transition:all .15s;
}
.video-block:hover{ border-color:var(--cyan-dim); background:var(--bg-raised); }
.video-icon{
  width:38px; height:38px; min-width:38px; border-radius:9px; background:rgba(61,214,197,0.1);
  display:flex; align-items:center; justify-content:center; color:var(--cyan);
}
.video-text{ flex:1; }
.video-title{ font-size:13.5px; color:var(--text); font-weight:600; }
.video-sub{ font-size:12px; color:var(--text-faint); font-family:var(--mono); margin-top:2px; }
.video-arrow{ color:var(--text-faint); }

/* ============ FLASHCARDS ============ */
.fc-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(230px,1fr)); gap:14px; }
.fc{ perspective:1200px; height:188px; cursor:pointer; }
.fc-inner{ position:relative; width:100%; height:100%; transition:transform .5s cubic-bezier(.4,.2,.2,1); transform-style:preserve-3d; }
.fc.flipped .fc-inner{ transform:rotateY(180deg); }
.fc-face{
  position:absolute; inset:0; backface-visibility:hidden; border-radius:11px; padding:16px;
  display:flex; flex-direction:column; border:1px solid var(--border);
}
.fc-front{ background:var(--bg-card); }
.fc-front .fc-tag{ font-family:var(--mono); font-size:9.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:1px; }
.fc-front .fc-q{ font-size:14px; color:var(--text); margin-top:8px; flex:1; display:flex; align-items:center; }
.fc-front .fc-hint{ font-family:var(--mono); font-size:10px; color:var(--cyan-dim); margin-top:auto; }
.fc-back{ background:linear-gradient(160deg, #122421, var(--bg-card)); transform:rotateY(180deg); border-color:var(--cyan-dim); cursor:default; }
.fc-back .fc-tag{ font-family:var(--mono); font-size:9.5px; color:var(--cyan); text-transform:uppercase; letter-spacing:1px; }
.fc-back .fc-a{ font-size:13px; color:#e8f5f2; margin-top:8px; flex:1; overflow-y:auto; }
.fc-grade-row{ display:flex; gap:6px; margin-top:8px; }
.fc-grade-btn{
  flex:1; font-family:var(--mono); font-size:10.5px; padding:7px 6px; border-radius:7px; cursor:pointer;
  border:1px solid var(--border); background:var(--bg-panel); color:var(--text-dim); transition:all .15s;
  display:flex; align-items:center; justify-content:center; gap:5px;
}
.fc-grade-btn:hover{ filter:brightness(1.15); }
.fc-grade-btn.got-it{ border-color:rgba(95,217,122,0.4); color:var(--green); }
.fc-grade-btn.got-it:hover{ background:rgba(95,217,122,0.1); }
.fc-grade-btn.review-again{ border-color:rgba(255,180,84,0.4); color:var(--amber); }
.fc-grade-btn.review-again:hover{ background:rgba(255,180,84,0.1); }
.fc-grade-btn.active.got-it{ background:rgba(95,217,122,0.16); }
.fc-grade-btn.active.review-again{ background:rgba(255,180,84,0.16); }
.fc-status-row{ display:none; align-items:center; gap:8px; margin-top:8px; font-family:var(--mono); font-size:10px; }
.fc.graded .fc-status-row{ display:flex; }
.fc.graded .fc-grade-row{ display:none; }
.fc-status-tag{ padding:3px 8px; border-radius:5px; }
.fc-status-tag.got-it{ background:rgba(95,217,122,0.15); color:var(--green); }
.fc-status-tag.review-again{ background:rgba(255,180,84,0.15); color:var(--amber); }
.fc-retry-link{ color:var(--text-faint); cursor:pointer; text-decoration:underline; margin-left:auto; }
.fc-retry-link:hover{ color:var(--cyan); }
.fc-reviewed-badge{
  position:absolute; top:8px; right:8px; width:20px; height:20px; border-radius:50%;
  background:var(--green); display:none; align-items:center; justify-content:center; z-index:3;
  cursor:pointer; transition:all .15s; border:none; padding:0; margin:0; font:inherit; outline-offset:2px;
}
.fc.reviewed .fc-reviewed-badge{ display:flex; }
.fc.reviewed.needs-review .fc-reviewed-badge{ background:var(--amber); }
.fc-reviewed-badge .icon-check{ display:block; }
.fc-reviewed-badge .icon-undo{ display:none; }
.fc-reviewed-badge:hover{ background:var(--red) !important; transform:scale(1.12); }
.fc-reviewed-badge:hover .icon-check{ display:none; }
.fc-reviewed-badge:hover .icon-undo{ display:block; }
.fc-reviewed-badge svg{ width:11px; height:11px; pointer-events:none; }

/* ============ MCQ ============ */
.mcq-list{ display:flex; flex-direction:column; gap:16px; }
.mcq{ background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:16px 18px; }
.mcq-q{ font-size:14.5px; color:var(--text); margin-bottom:12px; display:flex; gap:8px; align-items:baseline; }
.mcq-q .qn{ font-family:var(--mono); color:var(--amber); white-space:nowrap; }
.mcq-attempts{ margin-left:auto; font-family:var(--mono); font-size:10px; color:var(--text-faint); white-space:nowrap; }
.mcq-opts{ display:flex; flex-direction:column; gap:8px; }
.mcq-opt{
  display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:7px; border:1px solid var(--border);
  cursor:pointer; font-size:13.5px; color:var(--text-dim); transition:all .15s; background:var(--bg-panel);
}
.mcq-opt:hover{ border-color:var(--cyan-dim); color:var(--text); }
.mcq-opt .letter{
  font-family:var(--mono); font-size:11px; width:20px; height:20px; min-width:20px; border-radius:5px;
  background:var(--bg-raised); display:flex; align-items:center; justify-content:center; color:var(--text-faint);
}
.mcq-opt.correct{ border-color:var(--green); background:rgba(95,217,122,0.08); color:#cdebd2; }
.mcq-opt.correct .letter{ background:var(--green); color:#08210f; }
.mcq-opt.wrong{ border-color:var(--red); background:rgba(255,107,107,0.08); color:#f3c9c9; }
.mcq-opt.wrong .letter{ background:var(--red); color:#2b0a0a; }
.mcq-opt.disabled{ pointer-events:none; }
.mcq-expl{
  margin-top:10px; padding:10px 12px; border-radius:7px; background:var(--bg-panel); border:1px solid var(--border-soft);
  font-size:13px; color:var(--text-dim); display:none;
}
.mcq.answered .mcq-expl{ display:block; }
.mcq-footer{ display:none; margin-top:10px; align-items:center; gap:10px; }
.mcq.answered .mcq-footer{ display:flex; }
.mcq-result-tag{ font-family:var(--mono); font-size:10.5px; padding:3px 9px; border-radius:5px; }
.mcq-result-tag.ok{ background:rgba(95,217,122,0.15); color:var(--green); }
.mcq-result-tag.bad{ background:rgba(255,107,107,0.15); color:var(--red); }
.mcq-retry-btn{
  font-family:var(--mono); font-size:11px; padding:6px 12px; border-radius:7px; border:1px solid var(--cyan-dim);
  background:rgba(61,214,197,0.08); color:var(--cyan); cursor:pointer; transition:all .15s;
}
.mcq-retry-btn:hover{ background:rgba(61,214,197,0.16); }

/* ============ SCHEDULE ============ */
.sched-grid{ display:flex; flex-direction:column; gap:10px; }
.sched-row{
  display:grid; grid-template-columns:120px 1fr auto; gap:14px; align-items:center;
  padding:13px 16px; background:var(--bg-card); border:1px solid var(--border); border-radius:9px;
}
.sched-time{ font-family:var(--mono); font-size:12.5px; color:var(--amber); }
.sched-task b{ color:var(--text); font-size:14px; }
.sched-task div{ color:var(--text-dim); font-size:12.5px; margin-top:2px; }

    <h4>The Golden Rules (memorize these, not the examples)</h4>
    <table class="tbl">
      <tr><th>Conversion</th><th>Method</th></tr>
      <tr><td>Decimal → Any base</td><td><b>Integer part:</b> divide repeatedly by target base, read remainders bottom→top (MSB last computed = top). <b>Fraction part:</b> multiply repeatedly by target base, take integer part each time, read top→bottom.</td></tr>
      <tr><td>Any base → Decimal</td><td>Sum of (digit × base<sup>position</sup>) for every digit, where position counts from 0 at the radix point, negative going right.</td></tr>
      <tr><td>Binary → Octal</td><td>Group bits in <b>3s</b> from the radix point outward (pad with zeros), convert each group to 1 octal digit.</td></tr>

      <p>Convert (10110101.11110)<sub>2</sub> → Octal: group in 3s from the point: <code>010 110 101 . 111 100</code> → <b>265.74</b></p>
      <p>Same binary → Hex: group in 4s: <code>1011 0101 . 1111 0000</code> → <b>B5.F0</b></p>

  content: `
    <h4>What is a Binary Code?</h4>
    <p>Given <b>n</b> bits, a binary code is a mapping from a set of represented elements to a subset of the 2ⁿ possible binary numbers. Relationship: <span class="formula" style="display:inline;padding:2px 8px;">n = log₂(M)</span> where M = number of elements to represent.</p>
    <p class="dim"><b>Number</b> represents a quantity (process: conversion). <b>Code</b> represents information/data in a specific format for storage/communication (process: encoding). E.g., 5 (number) vs 101 in binary or 01000001 ASCII for 'A' (code).</p>

    <h4>Binary Coded Decimal (BCD) — weighted</h4>
    <p>Each decimal digit (0–9) gets its own 4-bit binary equivalent (standard weight 8-4-2-1).</p>
    <table class="tbl">
      <tr><th>Decimal</th><th>Binary</th><th>BCD</th></tr>
      <tr><td>5</td><td>101</td><td>0101</td></tr>
      <tr><td>12</td><td>1100</td><td>0001 0010</td></tr>
      <tr><td>93</td><td>1011101</td><td>1001 0011</td></tr>
    </table>
    <div class="note">📌 BCD codes 1010–1111 (10–15) are <b>invalid/unused</b> — common trap in MCQs.</div>
    <p>Other weightings exist for the same digit: <b>8421</b> (standard), <b>84-2-1</b>, <b>2421</b> — all valid BCD schemes, just different bit-weight assignments.</p>

    <h4>Excess-3 Code (unweighted, self-complementing)</h4>
    <p>Obtained by adding <b>3</b> (0011) to the 8421-BCD value of each decimal digit.</p>
    <div class="example">
      <div class="ex-label">Worked Example</div>
      <p>Convert (15)<sub>10</sub> to Excess-3:</p>
      <p>Step 1 — BCD of 15: <code>0001 0101</code></p>
      <p>Step 2 — Add 0011 to each 4-bit group: <code>0100 1000</code></p>
    </div>
    <div class="note">📌 Excess-3 is <b>self-complementing</b>: the 9's complement of a digit can be obtained by simply inverting all bits (1's complement) of its Excess-3 code.</div>

    <h4>Gray Code (unweighted, reflected binary)</h4>
    <p>A binary numeral system where <b>two successive values differ in only one bit</b> ("single-bit change" / "unit-distance code"). Used for error reduction, analog data representation, low-power design.</p>
    <table class="tbl">
      <tr><th>Decimal</th><th>Binary</th><th>Gray</th></tr>
      <tr><td>0</td><td>000</td><td>000</td></tr>
      <tr><td>1</td><td>001</td><td>001</td></tr>
      <tr><td>2</td><td>010</td><td>011</td></tr>
      <tr><td>3</td><td>011</td><td>010</td></tr>
      <tr><td>4</td><td>100</td><td>110</td></tr>
      <tr><td>5</td><td>101</td><td>111</td></tr>
      <tr><td>6</td><td>110</td><td>101</td></tr>
      <tr><td>7</td><td>111</td><td>100</td></tr>
    </table>
    <p><b>Binary → Gray:</b> MSB stays same; each next gray bit = XOR of current and next binary bit (G₃=B₃, G₂=B₃⊕B₂, G₁=B₂⊕B₁, G₀=B₁⊕B₀).</p>
    <p><b>Gray → Binary:</b> MSB stays same; each next binary bit = XOR of previous binary bit (already computed) and current gray bit.</p>

    <h4>Alphanumeric Codes</h4>
    <ul>
      <li><b>ASCII</b> — American Standard Code for Information Interchange. 7-bit code → 128 characters: 94 printable + 34 non-printing (control) characters.</li>
      <li><b>EBCDIC</b> — IBM's 8-bit code, used in mainframes.</li>
      <li><b>Unicode</b> (UTF-8/UTF-16) — universal character set, 140,000+ characters, all languages + emoji.</li>
    </ul>
    <div class="note">
      <b>ASCII property to memorize:</b><br>
      Digits 0–9 → hex 30–39<br>

    <h4>What is a Postulate?</h4>
    <p>A <b>postulate (axiom)</b> is a basic, foundational assumption accepted as true without proof — a starting point for further reasoning. A <b>theorem</b> is then derived/proven from postulates.</p>

    <h4>General Algebraic Postulates (apply broadly)</h4>
    <ol style="padding-left:20px;">
      <li><b>Closure:</b> performing the operation on members of a set always yields a result still in that set.</li>
      <li><b>Associative:</b> (x#y)#z = x#(y#z)</li>

    <p>Boolean algebra = a set B with two binary operators (+) and (·), satisfying:</p>
    <ol style="padding-left:20px;">

      <li>∃ at least two elements x,y ∈ B such that x≠y (i.e., B has ≥2 elements: {0,1})</li>

      <li><b>Distributive law of + over ·</b> [x+(y·z)=(x+y)·(x+z)] is valid <i>only</i> in Boolean algebra, not ordinary algebra.</li>
      <li>No additive/multiplicative inverse, no division or multiplication (in the ordinary sense) in Boolean algebra.</li>
      <li><b>Complement</b> only exists in Boolean algebra.</li>

      <li>Confirm the circuit is combinational (no feedback/memory).</li>

      <li>Label intermediate gate outputs that depend on inputs or already-labeled gate outputs; determine those too.</li>
      <li>Repeat step 3 until you reach the final circuit output.</li>
      <li>Back-substitute intermediate functions to express the final output purely in terms of input variables.</li>
    </ol>

    <h4>Analysis Procedure: Circuit → Truth Table</h4>
    <ol style="padding-left:20px;">
      <li>Confirm combinational circuit.</li>
      <li>Determine number of inputs n; list all 2ⁿ input combinations (0 to 2ⁿ−1 in binary).</li>
      <li>Label and compute intermediate gate outputs as functions of inputs / previous labels.</li>
      <li>Proceed gate-by-gate until the final output columns are filled in.</li>
      <li>(Alternative: if you already have the derived Boolean function, just plug in each input combination directly.)</li>

    <h4>Design Procedure (problem statement → circuit)</h4>
    <ol style="padding-left:20px;">
      <li><b>Determine</b> the required number of inputs/outputs; assign symbols to each.</li>
      <li><b>Derive the truth table</b> from the specification — 2ⁿ input rows; output values from the spec; note any don't-care conditions.</li>

  {q:"Half Subtractor's borrow output B equals:", opts:["xy","x'y","xy'","x⊕y"], correct:1, expl:"B = x'y — borrow only needed when minuend(0) < subtrahend(1)."},
  {q:"What determines a borrow (B=1) in a Full Subtractor?", opts:["x equals y","x is greater than y+z","x is less than y+z","Always 0"], correct:2, expl:"A borrow is needed whenever the minuend bit is smaller than (subtrahend + incoming borrow)."},
  {q:"ASCII is a how-many-bit code representing how many characters?", opts:["8-bit, 256 characters","7-bit, 128 characters","4-bit, 16 characters","16-bit, 65536 characters"], correct:1, expl:"Standard ASCII: 7 bits → 128 characters (94 printable + 34 control)."},
  {q:"To convert ASCII uppercase to lowercase, you:", opts:["Flip bit 6","Flip bit 0","Add a parity bit","Invert all bits"], correct:0, expl:"Bit 6 toggling switches between upper and lower case in ASCII."},
  {q:"Higher base number systems require ___ digits to represent the same value, but ___ symbols overall.", opts:["More; fewer","Fewer; more","Equal; equal","Fewer; fewer"], correct:1, expl:"Higher base → fewer digits per value, but more total symbols to learn/manage — the core trade-off."},
  {q:"What is an Essential Prime Implicant required to do?", opts:["Cover zero minterms","Cover a minterm no other prime implicant covers","Always be the smallest grouping","Only apply to maxterms"], correct:1, expl:"This uniqueness is exactly why it must appear in the final simplified expression."},
  {q:"A 4-bit combined Adder-Subtractor typically uses ___ gates to conditionally complement inputs for subtraction.", opts:["AND","OR","XOR","NAND"], correct:2, expl:"XOR gates controlled by a mode bit conditionally invert the B inputs for 2's-complement-based subtraction."}
];


</script>
<script>
// ============================================================
// DLD Study Guide — Application Logic (multi-page version)
// ============================================================

// ---------- State ----------
const STATE = {
  checklist: {},   // key: "ch1:0" -> true/false
  flashcards: {},  // key: "ch1:3" -> true (reviewed/flipped at least once)
  mcq: {}          // key: "ch1:2" -> {answered:true, correct:true, attempts:1}
};

const STORAGE_KEY = "dld_study_progress_v2";

// Persistence strategy:
// Primary: browser localStorage — survives closing the file/tab/browser entirely,
// since it's tied to this HTML file's origin on disk, not to any session.
// Secondary (best-effort): window.storage, if present (e.g. when running inside
// an environment that provides it) — kept in sync as a backup, but localStorage
// is the source of truth so progress survives even outside such environments.

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      Object.assign(STATE.checklist, parsed.checklist || {});
      Object.assign(STATE.flashcards, parsed.flashcards || {});
      Object.assign(STATE.mcq, parsed.mcq || {});
    }
  } catch (e) {
    console.warn("Could not load saved progress from localStorage:", e);
  }
}

let saveTimeout = null;
function saveState() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    const payload = JSON.stringify(STATE);
    try {
      localStorage.setItem(STORAGE_KEY, payload);
    } catch (e) {
      console.warn("Could not save progress to localStorage:", e);
    }
    // best-effort secondary backup, if available — never required for the app to work
    try {
      if (window.storage && window.storage.set) {
        window.storage.set(STORAGE_KEY, payload, false).catch(()=>{});
      }
    } catch (e) { /* ignore */ }
  }, 250);
}

// ---------- Small helpers ----------
function checkSvg() {
  return `<svg viewBox="0 0 16 16" fill="none"><path d="M3 8.5L6.2 11.7L13 4" stroke="#04211d" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function smallCheckSvg() {
  return `<svg viewBox="0 0 16 16" fill="none"><path d="M3 8.5L6.2 11.7L13 4" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function undoSvg() {
  return `<svg viewBox="0 0 16 16" fill="none"><path d="M4 4L12 12M12 4L4 12" stroke="#fff" stroke-width="2.3" stroke-linecap="round"/></svg>`;
}

// ============================================================
// PAGE MODEL
// Each "page" is a routable unit: home, ch1..ch10, final, dashboard
// ============================================================
const PAGES = [];

function buildPageModel() {
  PAGES.push({ id: "home", kind: "home", navLabel: "Overview", navNum: "—" });
  PAGES.push({ id: "time", kind: "time", navLabel: "Time Estimates", navNum: "⏱" });
  CHAPTERS.forEach((ch, i) => {
    PAGES.push({ id: ch.id, kind: "chapter", chapter: ch, navLabel: ch.title, navNum: ch.num });
  });
  PAGES.push({ id: "final", kind: "final", navLabel: "Final Cumulative Review", navNum: "FR" });
  PAGES.push({ id: "dashboard", kind: "dashboard", navLabel: "Progress Dashboard", navNum: "∑" });
}

let currentPageIndex = 0;

// ============================================================
// RENDER: Sidebar nav
// ============================================================
function renderSidebarNav() {
  const nav = document.getElementById('sidebarNav');
  let html = '';
  html += `<div class="sidebar-group-label">Start here</div>`;
  html += sidebarLinkHTML(PAGES[0], 0);
  html += sidebarLinkHTML(PAGES[1], 1);

  html += `<div class="sidebar-group-label">Chapters</div>`;
  PAGES.forEach((p, i) => {
    if (p.kind === 'chapter') html += sidebarLinkHTML(p, i);
  });

  html += `<div class="sidebar-group-label">Wrap-up</div>`;
  PAGES.forEach((p, i) => {
    if (p.kind === 'final' || p.kind === 'dashboard') html += sidebarLinkHTML(p, i);
  });

  nav.innerHTML = html;

  // attach click handlers
  nav.querySelectorAll('[data-page-index]').forEach(el => {
    el.addEventListener('click', () => {
      goToPage(parseInt(el.getAttribute('data-page-index'), 10));
      closeMobileSidebar();
    });
  });
}

function sidebarLinkHTML(page, index) {
  const ringHTML = page.kind === 'chapter' ? `
    <span class="sring">
      <svg width="16" height="16" viewBox="0 0 16 16">
        <circle class="bgr" cx="8" cy="8" r="6.5"></circle>
        <circle class="fgr" id="snav-ring-${page.id}" cx="8" cy="8" r="6.5" stroke-dasharray="40.8" stroke-dashoffset="40.8"></circle>
      </svg>
    </span>
  ` : '';
  return `
    <div class="sidebar-link" data-page-index="${index}" id="snav-link-${page.id}">
      <span class="snum">${page.navNum}</span>
      <span class="stext">${page.navLabel}</span>
      ${ringHTML}
    </div>
  `;
}

// ============================================================
// RENDER: Pages
// ============================================================
function renderAllPages() {
  const root = document.getElementById('pages-root');
  root.innerHTML = PAGES.map((p, i) => `<div class="page is-hidden" id="page-${p.id}" data-index="${i}">${renderPageContent(p)}</div>`).join('');
}

function renderPageContent(page) {
  switch (page.kind) {
    case 'home': return renderHomePage();
    case 'time': return renderTimeEstimatesPage();
    case 'chapter': return renderChapterPage(page.chapter);
    case 'final': return renderFinalPage();
    case 'dashboard': return renderDashboardPage();
    default: return '';
  }
}

function renderHomePage() {
  const totalMins = CHAPTERS.reduce((sum, ch) => sum + parseMinutes(ch.time), 0) + 60;
  return `
    <div class="hero-eyebrow">CSE 4205 · Digital Logic Design</div>
    <h1 class="hero-h1" style="font-size:clamp(30px,4.4vw,46px); font-weight:800; letter-spacing:-0.02em; line-height:1.08; color:#f3f6fa;">
      Midterm in <span class="hl" style="color:var(--cyan);">1 day</span>.<br>Here's the whole circuit, mapped.
    </h1>
    <p class="hero-sub">A complete dark-mode study guide built from your slide deck — 10 chapters, every formula, truth table and worked example, with time estimates, videos, flashcards, MCQs, and a checklist that remembers what you've covered — even if you close this file and come back later.</p>
    <div class="hero-meta">
      <div class="meta-chip warn">⏱ Total study time: <b>≈ ${formatMinutes(totalMins)}</b></div>
      <div class="meta-chip">📚 10 chapters</div>
      <div class="meta-chip">🗂 80 checklist items</div>

      <div class="meta-chip">❓ 99 MCQs</div>
    </div>
    <div class="btn-row">
      <button class="btn primary" data-goto="time">▸ See time estimates</button>
      <button class="btn" data-goto="${CHAPTERS[0].id}">Start at Chapter 1</button>
    </div>

    <div style="margin-top:48px;">
      <div class="section-label">Table of contents</div>
      <div class="section-heading">Jump to any chapter</div>
      <div class="toc">
        ${CHAPTERS.map(ch => `
          <div class="toc-item" data-goto="${ch.id}">
            <span class="tn">${ch.num}</span>
            <span class="tt">${ch.title}</span>
            <span class="tc">${ch.time}</span>
          </div>
        `).join('')}
      </div>
    </div>

    <div style="margin-top:36px;">
      <div class="toc">
        <div class="toc-item" data-goto="final"><span class="tn">FR</span><span class="tt">Final Cumulative Review</span><span class="tc">60 min</span></div>
        <div class="toc-item" data-goto="dashboard"><span class="tn">∑</span><span class="tt">Progress Dashboard</span><span class="tc">live</span></div>
      </div>
    </div>

    <footer class="page-footer">built from your slides · DLD_Mid_all_slides.pdf · good luck — you've got this 🔧⚡</footer>
  `;
}

function parseMinutes(timeStr) {
  // handles formats like "35 min", "1 hr 10 min", "70 min"
  let total = 0;
  const hrMatch = timeStr.match(/(\d+)\s*hr/);
  const minMatch = timeStr.match(/(\d+)\s*min/);
  if (hrMatch) total += parseInt(hrMatch[1], 10) * 60;
  if (minMatch) total += parseInt(minMatch[1], 10);
  if (!hrMatch && !minMatch) {
    const n = parseInt(timeStr, 10);
    if (!isNaN(n)) total = n;
  }
  return total;
}

function formatMinutes(mins) {
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  if (h === 0) return `${m} min`;
  if (m === 0) return `${h} hr`;
  return `${h} hr ${m} min`;
}

function renderTimeEstimatesPage() {
  const totalMins = CHAPTERS.reduce((sum, ch) => sum + parseMinutes(ch.time), 0);
  const finalReviewMins = 60;
  const grandTotal = totalMins + finalReviewMins;

  return `
    <div class="section-label">Plan your hours</div>
    <div class="section-heading">How long each topic actually takes</div>
    <p class="section-desc">${TIME_PAGE_NOTE}</p>

    <div class="panel">
      <div class="checklist-title">Per-chapter time</div>
      <div class="sched-grid">
        ${CHAPTERS.map(ch => `
          <div class="sched-row" data-goto="${ch.id}" style="cursor:pointer;">
            <div class="sched-time">${ch.num}</div>
            <div class="sched-task"><b>${ch.title}</b><div>${ch.sub}</div></div>
            <div class="sched-dur">⏱ ${ch.time}</div>
          </div>
        `).join('')}
        <div class="sched-row" style="border-style:dashed; opacity:0.85;">
          <div class="sched-time" style="color:var(--violet);">FR</div>
          <div class="sched-task"><b>Final Cumulative Review</b><div>Mixed flashcards + 25-question MCQ test across everything</div></div>
          <div class="sched-dur">⏱ ${finalReviewMins} min</div>
        </div>
      </div>
    </div>

    <div class="panel" style="margin-top:18px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:14px;">
      <div>
        <div class="checklist-title" style="margin-bottom:4px;">Total focused study time</div>
        <div style="color:var(--text-dim); font-size:13px;">All 10 chapters + final review, back to back</div>
      </div>
      <div style="font-family:var(--mono); font-size:32px; font-weight:800; color:var(--cyan);">${formatMinutes(grandTotal)}</div>
    </div>

    <div class="note" style="margin-top:18px;">📌 <b>Tip:</b> add ~15–20% on top for breaks, food, and re-reading anything that doesn't click the first time. Doing the heaviest chapters (Conversions, Boolean Algebra, K-Maps) earlier in the day when you're freshest tends to pay off most.</div>
  `;
}

function renderChapterPage(ch) {
  return `
    <div class="ch-page-head">
      <div class="ch-page-eyebrow"><span class="chnum">${ch.num}</span> CHAPTER ${parseInt(ch.num,10)} OF ${CHAPTERS.length}</div>
      <div class="ch-page-title">${ch.title}</div>
      <div class="ch-page-sub">${ch.sub}</div>
      <div class="ch-page-meta">
        <div class="meta-chip warn">⏱ ${ch.time}</div>
        <div class="meta-chip" id="chprog-chip-${ch.id}">0% complete</div>
      </div>
    </div>

    <div>
      <div class="checklist-title">Checklist</div>
      <div class="checklist" id="checklist-${ch.id}">
        ${ch.checklist.map((item, i) => `
          <label class="check-item">
            <input type="checkbox" data-key="${ch.id}:${i}" onchange="onCheckToggle(this)">
            <span class="check-box">${checkSvg()}</span>
            <span class="check-label">${item}</span>
          </label>
        `).join('')}
      </div>
    </div>

    <div class="content">
      <div class="checklist-title">Core content</div>
      ${ch.content}
    </div>

    <div style="margin-top:28px;">
      <div class="checklist-title">Watch</div>
      <a class="video-block" href="${ch.video.url}" target="_blank" rel="noopener">
        <div class="video-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>
        <div class="video-text">
          <div class="video-title">${ch.video.title}</div>
          <div class="video-sub">${ch.video.sub}</div>
        </div>
        <div class="video-arrow">↗</div>
      </a>
    </div>

    <div style="margin-top:28px;">
      <div class="checklist-title">Flashcards — click to flip</div>
      <div class="fc-grid" id="fc-${ch.id}">
        ${ch.flashcards.map((fc, i) => renderFlashcard(ch.id, i, fc)).join('')}
      </div>
    </div>

    <div style="margin-top:28px;">
      <div class="checklist-title">Quick MCQ check</div>
      <div class="mcq-list" id="mcq-${ch.id}">
        ${ch.mcqs.map((m, i) => renderMcq(ch.id, i, m)).join('')}
      </div>
    </div>
  `;
}

function renderFinalPage() {
  return `
    <div class="section-label">Last hour before the exam</div>
    <div class="section-heading">Mixed review — judge if you're actually ready</div>
    <p class="section-desc">Pulled from every chapter. If you're scoring well here without peeking, you're in good shape. If not, jump back to that chapter from the sidebar.</p>
    <div class="panel">
      <div class="checklist-title">Final flashcard sweep</div>
      <div class="fc-grid" id="finalFcGrid">
        ${FINAL_FLASHCARDS.map((fc, i) => renderFlashcard('final', i, fc)).join('')}
      </div>
    </div>
    <div class="panel">
      <div class="checklist-title">Final MCQ test (25 questions)</div>
      <div id="finalMcqScore" style="font-family:var(--mono); font-size:13px; color:var(--text-dim); margin-bottom:14px;"></div>
      <div class="mcq-list" id="finalMcqList">
        ${FINAL_MCQS.map((m, i) => renderMcq('final', i, m)).join('')}
      </div>
    </div>
  `;
}

function renderDashboardPage() {
  return `
    <div class="section-label">Live · auto-updates</div>
    <div class="section-heading">Where you actually stand</div>
    <p class="section-desc">Combines your checklist completion, flashcards flipped, and MCQs answered correctly across all 10 chapters plus the final review. Progress is saved to this browser automatically — closing the file and reopening it later keeps everything.</p>
    <div class="dash-grid" id="dashGrid"></div>
    <div class="panel" style="margin-top:18px;">
      <div class="checklist-title">Per-chapter breakdown</div>
      <div class="dash-chapter-list" id="dashChapterList"></div>
    </div>
    <div class="btn-row">
      <button class="btn" id="resetBtnInline" onclick="resetProgress()">⟲ Reset all progress</button>
    </div>
  `;
}

function renderFlashcard(chId, i, fc) {
  const key = `${chId}:${i}`;
  return `
    <div class="fc" data-key="${key}" id="fc-${key}">
      <button type="button" class="fc-reviewed-badge" title="Click to undo — unmark this card" onclick="undoCardReview(event, '${key}')">
        <span class="icon-check">${smallCheckSvg()}</span>
        <span class="icon-undo">${undoSvg()}</span>
      </button>
      <div class="fc-inner">
        <div class="fc-face fc-front" onclick="flipCard('${key}')">
          <div class="fc-tag">Q${i+1}</div>
          <div class="fc-q">${fc.q}</div>
          <div class="fc-hint">tap to flip ⟲</div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-tag">Answer</div>
          <div class="fc-a">${fc.a}</div>
          <div class="fc-grade-row">
            <button class="fc-grade-btn review-again" onclick="gradeCard(event, '${key}', false)">✗ Review again</button>
            <button class="fc-grade-btn got-it" onclick="gradeCard(event, '${key}', true)">✓ Got it</button>
          </div>
          <div class="fc-status-row">
            <span class="fc-status-tag" id="fc-status-tag-${key}"></span>
            <span class="fc-retry-link" onclick="retryCard(event, '${key}')">⟲ try again</span>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderMcq(chId, i, m) {
  const key = `${chId}:${i}`;
  return `
    <div class="mcq" data-key="${key}">
      <div class="mcq-q"><span class="qn">Q${i+1}.</span> ${m.q} <span class="mcq-attempts" id="attempts-${key}"></span></div>
      <div class="mcq-opts" id="opts-${key}">
        ${m.opts.map((opt, oi) => `
          <div class="mcq-opt" data-oi="${oi}" onclick="answerMcq(this, '${key}', ${oi}, ${m.correct})">
            <span class="letter">${String.fromCharCode(65+oi)}</span>
            <span>${opt}</span>
          </div>
        `).join('')}
      </div>
      <div class="mcq-expl">${m.expl}</div>
      <div class="mcq-footer">
        <span class="mcq-result-tag" id="result-tag-${key}"></span>
        <button class="mcq-retry-btn" onclick="retryMcq('${key}')">⟲ Try again</button>
      </div>
    </div>
  `;
}

// ============================================================
// INTERACTIONS
// ============================================================
function onCheckToggle(input) {
  const key = input.getAttribute('data-key');
  STATE.checklist[key] = input.checked;
  saveState();
  updateAllProgress();
}

function flipCard(key) {
  const el = document.getElementById(`fc-${key}`);
  if (!el) return;
  el.classList.toggle('flipped');
}

function gradeCard(evt, key, gotIt) {
  evt.stopPropagation(); // don't let the card flip back when tapping a grade button
  const el = document.getElementById(`fc-${key}`);
  if (!el) return;

  STATE.flashcards[key] = { reviewed: true, gotIt: gotIt };
  el.classList.add('reviewed', 'graded');
  el.classList.toggle('needs-review', !gotIt);

  const tag = document.getElementById(`fc-status-tag-${key}`);
  if (tag) {
    tag.textContent = gotIt ? '✓ Got it' : '✗ Review again';
    tag.className = 'fc-status-tag ' + (gotIt ? 'got-it' : 'review-again');
  }

  saveState();
  updateAllProgress();
}

function retryCard(evt, key) {
  evt.stopPropagation();
  const el = document.getElementById(`fc-${key}`);
  if (!el) return;
  el.classList.remove('graded', 'needs-review');
  // flip back to the question side so they can genuinely re-attempt it
  el.classList.remove('flipped');
  // keep STATE.flashcards[key] as-is (still counts toward "reviewed" progress);
  // only the visual grading resets so they can re-grade after trying again
}

function undoCardReview(evt, key) {
  evt.stopPropagation(); // don't trigger a flip when tapping the badge
  const el = document.getElementById(`fc-${key}`);
  if (!el) return;

  // Fully clears this card's progress — for when a card got marked reviewed
  // by mistake (e.g. accidental "Got it" tap) and you want it to count as
  // un-reviewed again, not just re-gradable.
  delete STATE.flashcards[key];
  el.classList.remove('reviewed', 'graded', 'needs-review', 'flipped');

  const tag = document.getElementById(`fc-status-tag-${key}`);
  if (tag) { tag.textContent = ''; tag.className = 'fc-status-tag'; }

  saveState();
  updateAllProgress();
}

function answerMcq(optEl, key, chosenIdx, correctIdx) {
  const mcqEl = optEl.closest('.mcq');
  if (mcqEl.classList.contains('answered')) return; // locked until "try again"

  const allOpts = mcqEl.querySelectorAll('.mcq-opt');
  allOpts.forEach(o => o.classList.add('disabled'));

  const isCorrect = chosenIdx === correctIdx;
  if (isCorrect) {
    optEl.classList.add('correct');
  } else {
    optEl.classList.add('wrong');
    allOpts[correctIdx].classList.add('correct');
  }
  mcqEl.classList.add('answered');

  const prev = STATE.mcq[key] || { attempts: 0, everCorrect: false };
  const attempts = (prev.attempts || 0) + 1;
  const everCorrect = prev.everCorrect || isCorrect;
  STATE.mcq[key] = { answered: true, correct: isCorrect, attempts, everCorrect };

  const tag = document.getElementById(`result-tag-${key}`);
  if (tag) {
    tag.textContent = isCorrect ? '✓ Correct' : '✗ Incorrect';
    tag.className = 'mcq-result-tag ' + (isCorrect ? 'ok' : 'bad');
  }
  const attemptsLbl = document.getElementById(`attempts-${key}`);
  if (attemptsLbl) attemptsLbl.textContent = attempts > 1 ? `attempt ${attempts}` : '';

  saveState();
  updateAllProgress();
}

function retryMcq(key) {
  const mcqEl = document.querySelector(`.mcq[data-key="${key}"]`);
  if (!mcqEl) return;
  mcqEl.classList.remove('answered');
  const opts = mcqEl.querySelectorAll('.mcq-opt');
  opts.forEach(o => {
    o.classList.remove('correct', 'wrong', 'disabled');
  });
  // keep "answered/everCorrect/attempts" history in STATE for progress purposes,
  // but allow re-answering visually. Progress credit (mcq "answered") already counted.
}

// ============================================================
// PROGRESS CALCULATION
// ============================================================
function computeChapterProgress(ch) {
  const total = ch.checklist.length + ch.flashcards.length + ch.mcqs.length;
  let done = 0;
  ch.checklist.forEach((_, i) => { if (STATE.checklist[`${ch.id}:${i}`]) done++; });
  ch.flashcards.forEach((_, i) => { if (STATE.flashcards[`${ch.id}:${i}`]) done++; });
  ch.mcqs.forEach((_, i) => { if (STATE.mcq[`${ch.id}:${i}`] && STATE.mcq[`${ch.id}:${i}`].answered) done++; });
  return total === 0 ? 0 : Math.round((done / total) * 100);
}

function computeOverallStats() {
  let checklistTotal = 0, checklistDone = 0;
  let fcTotal = 0, fcDone = 0, fcNeedsReview = 0;
  let mcqTotal = 0, mcqAnswered = 0, mcqCorrect = 0;

  function tallyFc(key) {
    const r = STATE.flashcards[key];
    if (!r) return;
    fcDone++;
    if (r !== true && r.gotIt === false) fcNeedsReview++;
  }

  CHAPTERS.forEach(ch => {
    checklistTotal += ch.checklist.length;
    ch.checklist.forEach((_, i) => { if (STATE.checklist[`${ch.id}:${i}`]) checklistDone++; });

    fcTotal += ch.flashcards.length;
    ch.flashcards.forEach((_, i) => tallyFc(`${ch.id}:${i}`));

    mcqTotal += ch.mcqs.length;
    ch.mcqs.forEach((_, i) => {
      const r = STATE.mcq[`${ch.id}:${i}`];
      if (r && r.answered) { mcqAnswered++; if (r.everCorrect) mcqCorrect++; }
    });
  });

  fcTotal += FINAL_FLASHCARDS.length;
  FINAL_FLASHCARDS.forEach((_, i) => tallyFc(`final:${i}`));

  mcqTotal += FINAL_MCQS.length;
  FINAL_MCQS.forEach((_, i) => {
    const r = STATE.mcq[`final:${i}`];
    if (r && r.answered) { mcqAnswered++; if (r.everCorrect) mcqCorrect++; }
  });

  const grandTotal = checklistTotal + fcTotal + mcqTotal;
  const grandDone = checklistDone + fcDone + mcqAnswered;
  const overallPct = grandTotal === 0 ? 0 : Math.round((grandDone / grandTotal) * 100);

  return { checklistTotal, checklistDone, fcTotal, fcDone, fcNeedsReview, mcqTotal, mcqAnswered, mcqCorrect, overallPct };
}

function updateAllProgress() {
  const stats = computeOverallStats();

  const sidebarFill = document.getElementById('sidebarFill');
  const sidebarPct = document.getElementById('sidebarPct');
  if (sidebarFill) sidebarFill.style.width = stats.overallPct + '%';
  if (sidebarPct) sidebarPct.textContent = stats.overallPct + '%';

  CHAPTERS.forEach(ch => {
    const pct = computeChapterProgress(ch);
    const ring = document.getElementById(`snav-ring-${ch.id}`);
    if (ring) {
      const circumference = 40.8; // 2*pi*6.5
      ring.style.strokeDashoffset = circumference - (pct / 100) * circumference;
      ring.style.stroke = pct === 100 ? '#5fd97a' : pct > 0 ? '#3dd6c5' : '#222b38';
    }
    const chip = document.getElementById(`chprog-chip-${ch.id}`);
    if (chip) chip.textContent = pct + '% complete';
  });

  // final mcq score
  let finalAnswered = 0, finalCorrect = 0;
  FINAL_MCQS.forEach((_, i) => {
    const r = STATE.mcq[`final:${i}`];
    if (r && r.answered) { finalAnswered++; if (r.everCorrect) finalCorrect++; }
  });
  const scoreEl = document.getElementById('finalMcqScore');
  if (scoreEl) {
    if (finalAnswered === 0) {
      scoreEl.textContent = `0 / ${FINAL_MCQS.length} answered`;
    } else {
      const pct = Math.round((finalCorrect / finalAnswered) * 100);
      scoreEl.textContent = `${finalAnswered} / ${FINAL_MCQS.length} answered · ${finalCorrect} correct (${pct}%)`;
    }
  }

  renderDashboardCards(stats);
  renderDashboardChapterList();
}

function renderDashboardCards(stats) {
  const grid = document.getElementById('dashGrid');
  if (!grid) return;
  const mcqPct = stats.mcqAnswered === 0 ? 0 : Math.round((stats.mcqCorrect / stats.mcqAnswered) * 100);

  grid.innerHTML = `
    <div class="dash-card">
      <div class="dlabel">Overall progress</div>
      <div class="dval">${stats.overallPct}<span class="unit">%</span></div>
      <div class="dash-bar-track"><div class="dash-bar-fill" style="width:${stats.overallPct}%; background:linear-gradient(90deg,#2a8f84,#3dd6c5);"></div></div>
    </div>
    <div class="dash-card">
      <div class="dlabel">Checklist items reviewed</div>
      <div class="dval">${stats.checklistDone}<span class="unit"> / ${stats.checklistTotal}</span></div>
      <div class="dash-bar-track"><div class="dash-bar-fill" style="width:${pctOf(stats.checklistDone, stats.checklistTotal)}%; background:linear-gradient(90deg,#a87530,#ffb454);"></div></div>
    </div>
    <div class="dash-card">
      <div class="dlabel">Flashcards flipped</div>
      <div class="dval">${stats.fcDone}<span class="unit"> / ${stats.fcTotal}</span></div>
      <div class="dash-bar-track"><div class="dash-bar-fill" style="width:${pctOf(stats.fcDone, stats.fcTotal)}%; background:linear-gradient(90deg,#5e3fa8,#a78bfa);"></div></div>
      ${stats.fcNeedsReview > 0 ? `<div style="margin-top:9px; font-family:var(--mono); font-size:10.5px; color:var(--amber);">⚠ ${stats.fcNeedsReview} marked "review again"</div>` : ''}
    </div>
    <div class="dash-card">
      <div class="dlabel">MCQ accuracy (best attempt)</div>
      <div class="dval">${mcqPct}<span class="unit">% (${stats.mcqCorrect}/${stats.mcqAnswered})</span></div>
      <div class="dash-bar-track"><div class="dash-bar-fill" style="width:${mcqPct}%; background:linear-gradient(90deg,#1f8f4a,#5fd97a);"></div></div>
    </div>
  `;
}

function renderDashboardChapterList() {
  const list = document.getElementById('dashChapterList');
  if (!list) return;
  list.innerHTML = CHAPTERS.map(ch => {
    const pct = computeChapterProgress(ch);
    return `
      <div class="dash-chapter-row" data-goto="${ch.id}">
        <span class="dcr-num">${ch.num}</span>
        <span class="dcr-title">${ch.title}</span>
        <span class="dcr-track"><span class="dcr-fill" style="width:${pct}%;"></span></span>
        <span class="dcr-pct">${pct}%</span>
      </div>
    `;
  }).join('');
  list.querySelectorAll('[data-goto]').forEach(el => {
    el.addEventListener('click', () => goToPageById(el.getAttribute('data-goto')));
  });
}

function pctOf(a, b) { return b === 0 ? 0 : Math.round((a / b) * 100); }

// ============================================================
// RESET
// ============================================================
function resetProgress() {
  if (!confirm("Reset all checklist, flashcard, and MCQ progress? This can't be undone.")) return;
  STATE.checklist = {};
  STATE.flashcards = {};
  STATE.mcq = {};
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  try { if (window.storage && window.storage.delete) window.storage.delete(STORAGE_KEY, false).catch(()=>{}); } catch (e) {}

  renderAllPages();
  attachGoToHandlers();
  hydrateAllVisuals();
  showPage(currentPageIndex, false);
  updateAllProgress();
}

// ============================================================
// PAGE ROUTING
// ============================================================
function goToPageById(id) {
  const idx = PAGES.findIndex(p => p.id === id);
  if (idx >= 0) goToPage(idx);
}

function goToPage(index) {
  if (index < 0 || index >= PAGES.length) return;
  currentPageIndex = index;
  showPage(index, true);
  try { history.replaceState(null, '', '#' + PAGES[index].id); } catch (e) {}
}

function showPage(index, scrollTop) {
  document.querySelectorAll('.page').forEach(p => p.classList.add('is-hidden'));
  const page = PAGES[index];
  const el = document.getElementById(`page-${page.id}`);
  if (el) el.classList.remove('is-hidden');

  // sidebar active state
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
  const link = document.getElementById(`snav-link-${page.id}`);
  if (link) link.classList.add('active');

  updatePager(index);

  if (scrollTop) {
    const scrollContainer = document.getElementById('mainScroll');
    if (scrollContainer) scrollContainer.scrollTop = 0;
    window.scrollTo(0, 0);
  }
}

function updatePager(index) {
  const prevBtn = document.getElementById('pagerPrev');
  const nextBtn = document.getElementById('pagerNext');
  const prevTitle = document.getElementById('pagerPrevTitle');
  const nextTitle = document.getElementById('pagerNextTitle');
  const center = document.getElementById('pagerCenter');

  center.textContent = `${index + 1} / ${PAGES.length}`;

  if (index <= 0) {
    prevBtn.classList.add('disabled');
    prevTitle.textContent = '—';
  } else {
    prevBtn.classList.remove('disabled');
    prevTitle.textContent = PAGES[index - 1].navLabel;
  }

  if (index >= PAGES.length - 1) {
    nextBtn.classList.add('disabled');
    nextTitle.textContent = '—';
  } else {
    nextBtn.classList.remove('disabled');
    nextTitle.textContent = PAGES[index + 1].navLabel;
  }
}

function attachGoToHandlers() {
  document.querySelectorAll('[data-goto]').forEach(el => {
    el.addEventListener('click', () => goToPageById(el.getAttribute('data-goto')));
  });
}

// ============================================================
// HYDRATE VISUALS FROM STATE (after render or reset)
// ============================================================
function hydrateAllVisuals() {
  document.querySelectorAll('input[type=checkbox][data-key]').forEach(input => {
    const key = input.getAttribute('data-key');
    if (STATE.checklist[key]) input.checked = true;
  });

  document.querySelectorAll('.fc[data-key]').forEach(el => {
    const key = el.getAttribute('data-key');
    const r = STATE.flashcards[key];
    if (!r) return;
    el.classList.add('reviewed');
    // r can be `true` (legacy, pre-grading saves) or {reviewed, gotIt} (current format)
    if (r === true) return; // legacy: just mark reviewed, no grade to restore
    el.classList.add('graded');
    el.classList.toggle('needs-review', !r.gotIt);
    const tag = document.getElementById(`fc-status-tag-${key}`);
    if (tag) {
      tag.textContent = r.gotIt ? '✓ Got it' : '✗ Review again';
      tag.className = 'fc-status-tag ' + (r.gotIt ? 'got-it' : 'review-again');
    }
  });

  function hydrateMcqList(list, prefix) {
    list.forEach((m, i) => {
      const key = `${prefix}:${i}`;
      const r = STATE.mcq[key];
      if (!r || !r.answered) return;
      const mcqEl = document.querySelector(`.mcq[data-key="${key}"]`);
      if (!mcqEl) return;
      mcqEl.classList.add('answered');
      const opts = mcqEl.querySelectorAll('.mcq-opt');
      opts.forEach((o, oi) => {
        o.classList.add('disabled');
        if (oi === m.correct) o.classList.add('correct');
        else if (oi === undefined) {}
      });
      // mark the user's last choice as wrong only if their last attempt was incorrect;
      // we don't store which option index was chosen, so just show correct + a result tag
      const tag = document.getElementById(`result-tag-${key}`);
      if (tag) {
        tag.textContent = r.everCorrect ? '✓ Correct' : '✗ Incorrect';
        tag.className = 'mcq-result-tag ' + (r.everCorrect ? 'ok' : 'bad');
      }
      const attemptsLbl = document.getElementById(`attempts-${key}`);
      if (attemptsLbl && r.attempts > 1) attemptsLbl.textContent = `attempt ${r.attempts}`;
    });
  }
  CHAPTERS.forEach(ch => hydrateMcqList(ch.mcqs, ch.id));
  hydrateMcqList(FINAL_MCQS, 'final');
}

// ============================================================
// MOBILE SIDEBAR
// ============================================================
function openMobileSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarBackdrop').classList.add('show');
}
function closeMobileSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarBackdrop').classList.remove('show');
}

// ============================================================
// INIT
// ============================================================
function init() {
  loadState();
  buildPageModel();

  renderSidebarNav();
  renderAllPages();
  attachGoToHandlers();
  hydrateAllVisuals();

  // determine starting page from hash, if present
  let startIndex = 0;
  const hash = window.location.hash.replace('#', '');
  if (hash) {
    const idx = PAGES.findIndex(p => p.id === hash);
    if (idx >= 0) startIndex = idx;
  }
  currentPageIndex = startIndex;
  showPage(startIndex, false);

  updateAllProgress();

  document.getElementById('resetBtn').addEventListener('click', resetProgress);
  document.getElementById('pagerPrev').addEventListener('click', () => goToPage(currentPageIndex - 1));
  document.getElementById('pagerNext').addEventListener('click', () => goToPage(currentPageIndex + 1));
  document.getElementById('sidebarToggle').addEventListener('click', openMobileSidebar);
  document.getElementById('sidebarBackdrop').addEventListener('click', closeMobileSidebar);

  window.addEventListener('hashchange', () => {
    const h = window.location.hash.replace('#', '');
    const idx = PAGES.findIndex(p => p.id === h);
    if (idx >= 0 && idx !== currentPageIndex) goToPage(idx);
  });

  // keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowRight' && !e.metaKey && !e.ctrlKey) goToPage(currentPageIndex + 1);
    if (e.key === 'ArrowLeft' && !e.metaKey && !e.ctrlKey) goToPage(currentPageIndex - 1);
  });
}

document.addEventListener('DOMContentLoaded', init);

</script>
